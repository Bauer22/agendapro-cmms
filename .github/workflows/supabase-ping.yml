name: Supabase Keep Alive Ping

on:
  schedule:
    # Runs every 5 days at 08:00 UTC (05:00 Brasília)
    - cron: '0 8 */5 * *'
  workflow_dispatch: # Allow manual trigger

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Supabase to prevent inactivity pause
        run: |
          echo "🏓 Pinging Supabase at $(date)"
          
          RESPONSE=$(curl -s -o /dev/null -w "%{http_code}" \
            "${{ secrets.SUPABASE_URL }}/rest/v1/profiles?select=id&limit=1" \
            -H "apikey: ${{ secrets.SUPABASE_ANON_KEY }}" \
            -H "Authorization: Bearer ${{ secrets.SUPABASE_ANON_KEY }}")
          
          echo "Response code: $RESPONSE"
          
          if [ "$RESPONSE" = "200" ] || [ "$RESPONSE" = "401" ]; then
            echo "✅ Supabase is alive! (HTTP $RESPONSE)"
          else
            echo "⚠️ Unexpected response: $RESPONSE"
            exit 1
          fi

      - name: Log success
        run: echo "✅ Ping completed at $(date) — Supabase will not pause"
